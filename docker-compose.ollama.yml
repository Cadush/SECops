version: "3.8"

# SecOps Legacy Doc - LLM local com Ollama
# Uso:
#   docker compose -f docker-compose.ollama.yml up -d
#   docker compose -f docker-compose.ollama.yml exec ollama ollama pull qwen2.5-coder:14b

services:
  ollama:
    image: ollama/ollama:latest
    container_name: secops-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # Se nao tiver GPU, remover o bloco deploy acima e usar CPU:
    # environment:
    #   - OLLAMA_NUM_PARALLEL=1

volumes:
  ollama_models:
