# GitLab CI - SecOps Dependency Audit
# Copiar para: .gitlab-ci.yml na raiz do seu projeto

stages:
  - security

dep-audit:
  stage: security
  image: secops/dep-audit:latest
  variables:
    SNYK_TOKEN: $SNYK_TOKEN
  script:
    - dep-audit $CI_PROJECT_DIR --output $CI_PROJECT_DIR/reports --fail-on high
  artifacts:
    paths:
      - reports/
    when: always
    expire_in: 30 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "schedule"
